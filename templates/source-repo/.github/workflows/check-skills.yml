name: Check Claude skills manifest

# TEMPLATE — copy to .github/workflows/check-skills.yml in your source repo (or fold the job into an
# existing CI workflow). PR-time guard on the source manifest: fails if a published skill is missing
# from tools/skill-marketplace/skills.json (it would silently never ship to the marketplace) or the
# manifest lists a skill that does not exist. Runs the canonical builder from a shallow clone of the
# public marketplace repo — no auth needed.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  skills-manifest:
    name: Skills manifest check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SKILLS_REPO: ArchPillar/claude-skills
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch the canonical builder
        run: git clone --depth 1 "https://github.com/${SKILLS_REPO}.git" target
      - name: Check skill marketplace manifest
        run: python3 target/build_marketplace.py --check --source-root "$GITHUB_WORKSPACE"
